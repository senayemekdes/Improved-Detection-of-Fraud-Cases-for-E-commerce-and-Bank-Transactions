name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        # Run pytest if you have tests
        if [ -d "tests" ]; then
          pip install pytest
          python -m pytest tests/ -v
        else
          echo "No tests directory found. Skipping tests."
        fi

    - name: Validate DVC
      run: |
        dvc --version
        dvc status

    - name: Check notebooks
      run: |
        echo "Notebook validation can be added here (e.g., using nbconvert or papermill)"
